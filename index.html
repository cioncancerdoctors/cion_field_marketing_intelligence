<script type="text/babel" data-presets="react">
// =========================================
// SECTION 1: CONFIG
// =========================================
const SUPABASE_URL = 'https://bhaarkeecvidorkndqfa.supabase.co';
const SUPABASE_ANON_KEY = 'sb_publishable_I8fNUTwdPbttnbXHxv6uzA_9yl-5jSi';
const APP_VERSION = '2.3.0';

// =========================================
// SECTION 2: SUPABASE CLIENT
// =========================================
const supa = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

// =========================================
// SECTION 3: CONSTANTS
// =========================================
const SPECIALTIES = ['GP','Physician','Dentist','Maxillofacial','ENT','Gynae','General Surgeon','Paediatrician','Small Hospital','Large Hospital','Diagnostic Centre','Other'];
const DAYS = ['Mon','Tue','Wed','Thu','Fri','Sat','Sun'];
const HOURS = ['9-10 AM','10-11 AM','11-12 PM','12-1 PM','1-2 PM','2-3 PM','3-4 PM','4-5 PM','5-6 PM','6-7 PM','7-8 PM','8-9 PM'];
const TIER_GUIDANCE = {
  A: { emoji: '🔥', label: 'Hot Lead', advice: 'Meet 3–4 times a month' },
  B: { emoji: '☀️', label: 'Warm', advice: 'Meet 1–2 times a month' },
  C: { emoji: '❄️', label: 'Cold', advice: 'Meet once a month' }
};
const LEARNING_CATEGORIES = [
  { key: 'basics', name: 'Cancer Basics', icon: '📚' },
  { key: 'types', name: 'Cancer Types', icon: '🧬' },
  { key: 'treatments', name: 'Cancer Treatments', icon: '💊' },
  { key: 'cion_services', name: 'CION Services', icon: '🏥' },
  { key: 'cion_doctors', name: 'CION Doctors', icon: '👨‍⚕️' },
  { key: 'biopsy', name: 'Types of Biopsies', icon: '🔬' },
  { key: 'chemo', name: 'Chemotherapy Types', icon: '💉' },
  { key: 'surgery', name: 'Cancer Surgeries', icon: '⚕️' },
  { key: 'radiation', name: 'Radiation Types', icon: '☢️' },
  { key: 'protocols', name: 'Cancer Protocols', icon: '📋' },
  { key: 'network', name: 'CION Network', icon: '🗺️' }
];

// =========================================
// SECTION 4: DB HELPERS
// =========================================
const db = {
  async getReps() {
    const { data } = await supa.from('reps').select('*').eq('active', true).order('name');
    return data || [];
  },
  async findRepByName(name) {
    const { data } = await supa.from('reps').select('*').ilike('name', name.trim()).eq('active', true).maybeSingle();
    return data;
  },
  async getZones() {
    const { data } = await supa.from('zones').select('*').order('name');
    return data || [];
  },
  async getDoctors() {
    const { data } = await supa.from('doctors').select('*, zones(name)').order('score', { ascending: false });
    return data || [];
  },
  async addDoctor(doc) {
    return await supa.from('doctors').insert([doc]).select().single();
  },
  async updateDoctor(id, updates) {
    return await supa.from('doctors').update(updates).eq('id', id);
  },
  async addPendingEdit(doctorId, repId, changes) {
    return await supa.from('pending_edits').insert([{ doctor_id: doctorId, rep_id: repId, changes }]);
  },
  async getPendingEdits() {
    const { data } = await supa.from('pending_edits')
      .select('*, doctors(name), reps(name)')
      .eq('status','pending')
      .order('created_at');
    return data || [];
  },
  async approveEdit(editId, doctorId, changes, reviewerId) {
    await supa.from('doctors').update(changes).eq('id', doctorId);
    return await supa.from('pending_edits').update({
      status: 'approved', reviewed_by: reviewerId, reviewed_at: new Date().toISOString()
    }).eq('id', editId);
  },
  async rejectEdit(editId, reviewerId, reason) {
    return await supa.from('pending_edits').update({
      status: 'rejected', reviewed_by: reviewerId, reviewed_at: new Date().toISOString(), reject_reason: reason
    }).eq('id', editId);
  },
  async getVisits(repId, limit = 50) {
    const { data } = await supa.from('visits')
      .select('*, doctors(name, clinic_name)')
      .eq('rep_id', repId)
      .order('visited_at', { ascending: false })
      .limit(limit);
    return data || [];
  },
  async addVisit(visit) {
    return await supa.from('visits').insert([visit]).select().single();
  },
  async getTodayActions() {
    const today = new Date().toISOString().split('T')[0];
    const { data } = await supa.from('doctors')
      .select('*, zones(name)')
      .lte('next_followup', today)
      .not('next_followup', 'is', null)
      .order('score', { ascending: false });
    return data || [];
  },
  async getDashboardStats() {
    const { data: visits } = await supa.from('visits').select('rep_id, doctor_id, interest, visited_at, met_status');
    const { data: reps } = await supa.from('reps').select('*').eq('role', 'rep');
    const { data: doctors } = await supa.from('doctors').select('tier, zone_id, zones(name)');
    const { data: pendingCount } = await supa.from('pending_edits').select('id').eq('status','pending');
    const { data: referrals } = await supa.from('referrals').select('influenced_by_rep, referred_by_doctor');
    return { visits: visits || [], reps: reps || [], doctors: doctors || [], pendingEdits: pendingCount?.length || 0, referrals: referrals || [] };
  },
  async addReferral(ref) {
    return await supa.from('referrals').insert([ref]).select().single();
  },
  async getLessons() {
    const { data } = await supa.from('lessons').select('*').eq('active', true).order('display_order');
    return data || [];
  },
  async getQuizQuestions(lessonId) {
    const { data } = await supa.from('quiz_questions').select('*').eq('lesson_id', lessonId).eq('active', true);
    return data || [];
  },
  async logQuizAttempt(att) {
    return await supa.from('quiz_attempts').insert([att]);
  },
  async getDailyLesson() {
    const today = new Date().toISOString().split('T')[0];
    const { data } = await supa.from('daily_lessons').select('*, lessons(*)').eq('scheduled_date', today).maybeSingle();
    if (data) return data.lessons;
    // fallback: pick a random active lesson
    const { data: all } = await supa.from('lessons').select('*').eq('active', true);
    if (all && all.length) return all[Math.floor(Math.random() * all.length)];
    return null;
  }
};

// =========================================
// SECTION 5: SCORING
// =========================================
const scoring = {
  calculate(doc, lastVisit = null) {
    let interest = 0, load = 0, fit = 0, warmth = 0;
    if (lastVisit && lastVisit.interest) interest = (lastVisit.interest / 5) * 40;
    const loadMap = { 'Empty': 5, 'Few': 15, 'Steady': 25, 'Packed': 30 };
    load = loadMap[doc.waiting_room] || 0;
    const highFit = ['GP','Physician','ENT','Gynae','General Surgeon','Dentist','Maxillofacial','Small Hospital'];
    if (highFit.includes(doc.specialty)) fit = 20;
    else if (doc.specialty) fit = 10;
    if (lastVisit) {
      if (lastVisit.met_status === 'doctor') warmth += 5;
      if (lastVisit.referral_likely === 'yes') warmth += 5;
    }
    return Math.round(interest + load + fit + warmth);
  },
  tier(score) {
    if (score >= 70) return 'A';
    if (score >= 40) return 'B';
    return 'C';
  }
};

// =========================================
// SECTION 6: OFFLINE QUEUE
// =========================================
const queue = {
  key: 'cion_offline_queue',
  add(item) {
    const q = this.all();
    q.push({ ...item, queuedAt: Date.now() });
    localStorage.setItem(this.key, JSON.stringify(q));
  },
  all() {
    try { return JSON.parse(localStorage.getItem(this.key) || '[]'); } catch { return []; }
  },
  async sync() {
    const items = this.all();
    if (items.length === 0) return 0;
    let synced = 0;
    const failed = [];
    for (const item of items) {
      try {
        if (item.type === 'visit') await supa.from('visits').insert([item.data]);
        else if (item.type === 'doctor') await supa.from('doctors').insert([item.data]);
        else if (item.type === 'pending_edit') await supa.from('pending_edits').insert([item.data]);
        synced++;
      } catch (e) { failed.push(item); }
    }
    localStorage.setItem(this.key, JSON.stringify(failed));
    return synced;
  }
};

// =========================================
// SECTION 7: APP
// =========================================
const { useState, useEffect } = React;

function App() {
  const [currentUser, setCurrentUser] = useState(() => {
    try { return JSON.parse(localStorage.getItem('cion_user') || 'null'); } catch { return null; }
  });
  const [screen, setScreen] = useState('home');
  const [screenParams, setScreenParams] = useState({});
  const [online, setOnline] = useState(navigator.onLine);
  const [pendingCount, setPendingCount] = useState(queue.all().length);

  useEffect(() => {
    const onOnline = async () => {
      setOnline(true);
      const n = await queue.sync();
      setPendingCount(queue.all().length);
      if (n > 0) alert('Synced ' + n + ' pending items.');
    };
    const onOffline = () => setOnline(false);
    window.addEventListener('online', onOnline);
    window.addEventListener('offline', onOffline);
    return () => {
      window.removeEventListener('online', onOnline);
      window.removeEventListener('offline', onOffline);
    };
  }, []);

  const handleLogin = (rep) => {
    setCurrentUser(rep);
    localStorage.setItem('cion_user', JSON.stringify(rep));
    localStorage.setItem('cion_last_name', rep.name);
  };
  const handleLogout = () => {
    setCurrentUser(null);
    localStorage.removeItem('cion_user');
    setScreen('home');
  };

  const goto = (s, params = {}) => { setScreen(s); setScreenParams(params); };

  if (!currentUser) return <Login onLogin={handleLogin} />;
  const isAdmin = currentUser.role === 'admin';

  return (
    <div className="min-h-screen pb-20">
      <Header user={currentUser} online={online} pendingCount={pendingCount} onLogout={handleLogout} />
      <main className="p-4 max-w-lg mx-auto">
        {screen === 'home' && <Home user={currentUser} goto={goto} />}
        {screen === 'doctors' && <DoctorList user={currentUser} goto={goto} />}
        {screen === 'addDoctor' && <DoctorForm user={currentUser} goto={goto} />}
        {screen === 'editDoctor' && <DoctorForm user={currentUser} goto={goto} doctorId={screenParams.doctorId} />}
        {screen === 'logVisit' && <LogVisit user={currentUser} goto={goto} preDoctorId={screenParams.doctorId} />}
        {screen === 'learn' && <Learn user={currentUser} />}
        {screen === 'lessonView' && <LessonView lessonId={screenParams.lessonId} user={currentUser} goto={goto} />}
        {screen === 'quiz' && <Quiz lessonId={screenParams.lessonId} user={currentUser} goto={goto} />}
        {screen === 'dashboard' && isAdmin && <Dashboard goto={goto} />}
        {screen === 'pendingEdits' && isAdmin && <PendingEditsQueue user={currentUser} goto={goto} />}
        {screen === 'addReferral' && isAdmin && <AddReferral goto={goto} />}
      </main>
      <BottomNav screen={screen} goto={goto} isAdmin={isAdmin} />
    </div>
  );
}

function Login({ onLogin }) {
  const [name, setName] = useState(localStorage.getItem('cion_last_name') || '');
  const [error, setError] = useState('');
  const [loading, setLoading] = useState(false);

  const submit = async () => {
    if (!name.trim()) { setError('Enter your name'); return; }
    setLoading(true); setError('');
    const rep = await db.findRepByName(name);
    setLoading(false);
    if (!rep) { setError('Name not found. Contact admin.'); return; }
    onLogin(rep);
  };

  return (
    <div className="min-h-screen flex flex-col items-center justify-center p-6 cion-primary text-white">
      <h1 className="text-3xl font-bold mb-2">CION Connect</h1>
      <p className="mb-8 opacity-80">Field Force App</p>
      <div className="w-full max-w-xs space-y-3">
        <p className="text-sm">Type your name to login:</p>
        <input className="input text-gray-800" placeholder="e.g. Sandeep"
          value={name} onChange={e => setName(e.target.value)}
          onKeyDown={e => e.key === 'Enter' && submit()} />
        {error && <p className="text-red-300 text-xs">{error}</p>}
        <button onClick={submit} disabled={loading}
          className="w-full bg-white text-purple-900 py-3 rounded-lg font-bold disabled:opacity-50">
          {loading ? 'Checking...' : 'Login'}
        </button>
      </div>
    </div>
  );
}

              'bg-gray-100 text-gray-700';
  return <span className={'text-xs px-2 py-1 rounded font-bold ' + cls}>{TIER_GUIDANCE[tier].emoji} {tier}</span>;

function ChipGroup({ options, value, onChange, multi = false }) {
  const arr = multi ? (value || []) : value;
  const isOn = (o) => multi ? arr.includes(o) : arr === o;
  const toggle = (o) => {
    if (multi) {
      const next = arr.includes(o) ? arr.filter(x => x !== o) : [...arr, o];
      onChange(next);
    } else onChange(o);
  };
  return (
    <div className="flex flex-wrap gap-1">
      {options.map(o => (
        <span key={o} className={'chip ' + (isOn(o) ? 'chip-on' : 'chip-off')} onClick={() => toggle(o)}>{o}</span>
      ))}
    </div>
  );
}

function DoctorForm({ user, goto, doctorId = null }) {
  const isEdit = !!doctorId;
  const isAdmin = user.role === 'admin';
  const [zones, setZones] = useState([]);
  const [original, setOriginal] = useState(null);
  const [form, setForm] = useState({
    name: '', mobile: '', specialty: '', clinic_name: '', zone_id: '',
    op_fee: '', waiting_room: '', area_class: '',
    cancer_services: { biopsy:'na', screening:'na', surgery:'na', chemo:'na', radiation:'na', supportive:'na' },
    refers_to: '',
    insurance_accepted: false, aarogyasri: false,
    visit_days: [], visit_hours: []
  });
  const [saving, setSaving] = useState(false);

  useEffect(() => {
    db.getZones().then(setZones);
    if (isEdit) {
      db.getDoctors().then(docs => {
        const d = docs.find(x => x.id === doctorId);
        if (d) {
          setOriginal(d);
          setForm({
            name: d.name || '', mobile: d.mobile || '', specialty: d.specialty || '',
            clinic_name: d.clinic_name || '', zone_id: d.zone_id || '',
            op_fee: d.op_fee || '', waiting_room: d.waiting_room || '', area_class: d.area_class || '',
            cancer_services: d.cancer_services || { biopsy:'na', screening:'na', surgery:'na', chemo:'na', radiation:'na', supportive:'na' },
            refers_to: d.refers_to || '',
            insurance_accepted: d.insurance_accepted || false, aarogyasri: d.aarogyasri || false,
            visit_days: d.visit_days || [], visit_hours: d.visit_hours || []
          });
        }
      });
    }
  }, [doctorId]);

  const submit = async () => {
    if (!form.name || !form.specialty) { alert('Name and Specialty required'); return; }
    setSaving(true);
    const payload = {
      ...form,
      op_fee: form.op_fee ? parseInt(form.op_fee) : null,
      zone_id: form.zone_id ? parseInt(form.zone_id) : null
    };

    if (isEdit) {
      // Compute changed fields
      const changes = {};
      Object.keys(payload).forEach(k => {
        if (JSON.stringify(payload[k]) !== JSON.stringify(original[k])) changes[k] = payload[k];
      });
      if (Object.keys(changes).length === 0) { alert('No changes'); setSaving(false); return; }

      if (isAdmin) {
        await db.updateDoctor(doctorId, changes);
        alert('Updated ✓');
      } else {
        if (!navigator.onLine) {
          queue.add({ type: 'pending_edit', data: { doctor_id: doctorId, rep_id: user.id, changes }});
          alert('Edit queued offline. Will submit when online.');

          await db.addPendingEdit(doctorId, user.id, changes);
          alert('Edit submitted for admin approval.');

      }
      setSaving(false);
      goto('doctors');
      return;
    }

    // New doctor

    payload.score = 0;
    payload.tier = 'C';

    if (!navigator.onLine) {
      queue.add({ type: 'doctor', data: payload });
      alert('Saved offline. Will sync when online.');
      setSaving(false);
      goto('doctors');
      return;

    const { error } = await db.addDoctor(payload);
    setSaving(false);
    if (error) { alert('Error: ' + error.message); return; }

function LogVisit({ user, goto, preDoctorId = null }) {
  const [doctors, setDoctors] = useState([]);
  const [doctorId, setDoctorId] = useState(preDoctorId || '');
  const [form, setForm] = useState({
    met_status: '', time_spent: '', interest: 3, referral_likely: '',
    phone_status: '', phone_captured: '',
    suspicious_cases: '',
    notes: '', stump_question: '', next_followup: '',
    update_visit_time: false, visit_days: [], visit_hours: []
  });
  const [gps, setGps] = useState(null);
  const [saving, setSaving] = useState(false);

  useEffect(() => {
    db.getDoctors().then(setDoctors);
    if (navigator.geolocation) {
      navigator.geolocation.getCurrentPosition(
        p => setGps({ lat: p.coords.latitude, lng: p.coords.longitude }),
        () => setGps(null), { timeout: 5000 }
      );
    }
  }, []);

  const selectedDoc = doctors.find(d => d.id === doctorId);

  const submit = async () => {
    if (!doctorId) { alert('Select a doctor'); return; }
    if (!form.met_status) { alert('Mark met status'); return; }
    setSaving(true);

    const visit = {
      doctor_id: doctorId, rep_id: user.id, visit_type: 'followup',
      met_status: form.met_status, time_spent: form.time_spent,
      interest: parseInt(form.interest), referral_likely: form.referral_likely,
      phone_status: form.phone_status || null,
      phone_captured: form.phone_status === 'got_today' ? form.phone_captured : null,
      suspicious_cases: form.suspicious_cases || null,
      notes: form.notes, stump_question: form.stump_question,
      next_followup: form.next_followup || null,
      gps_lat: gps?.lat, gps_lng: gps?.lng
    };

    if (!navigator.onLine) {
      queue.add({ type: 'visit', data: visit });
      alert('Saved offline. Will sync when online.');
      goto('home');
      return;
    }

    const { error } = await db.addVisit(visit);
    if (error) { alert('Error: ' + error.message); setSaving(false); return; }

    if (selectedDoc) {
      const newScore = scoring.calculate(selectedDoc, visit);
      const newTier = scoring.tier(newScore);
      const updates = { score: newScore, tier: newTier, next_followup: visit.next_followup };
      if (form.phone_status === 'got_today' && form.phone_captured) {
        updates.mobile = form.phone_captured;
      }
      if (form.update_visit_time) {
        updates.visit_days = form.visit_days;
        updates.visit_hours = form.visit_hours;
      }
      await db.updateDoctor(doctorId, updates);
    }

    setSaving(false);
    alert('Visit logged ✓');
    goto('home');
  };

  return (
    <div className="space-y-3">
      <h2 className="font-bold text-lg cion-primary-text">Log Visit</h2>

      <Field label="Doctor *">
        <select className="input" value={doctorId} onChange={e => setDoctorId(e.target.value)}>
          <option value="">Select doctor...</option>
          {doctors.map(d => <option key={d.id} value={d.id}>{d.name} — {d.clinic_name}</option>)}
        </select>
      </Field>

      <Field label="Met status *">
        <ChipGroup options={['Doctor','Staff','Not met']}
          value={form.met_status === 'doctor' ? 'Doctor' : form.met_status === 'staff' ? 'Staff' : form.met_status === 'not_met' ? 'Not met' : ''}
          onChange={v => setForm({...form, met_status: v === 'Doctor' ? 'doctor' : v === 'Staff' ? 'staff' : 'not_met'})} />
      </Field>

      <Field label="Time spent">
        <ChipGroup options={['2min','5min','10min+']}
          value={form.time_spent} onChange={v => setForm({...form, time_spent: v})} />
      </Field>

      <Field label={'Interest: ' + form.interest + '/5'}>
        <input type="range" min="1" max="5" value={form.interest} className="w-full"
          onChange={e => setForm({...form, interest: e.target.value})} />
      </Field>

      <Field label="Referral likely?">
        <ChipGroup options={['yes','maybe','no']}
          value={form.referral_likely} onChange={v => setForm({...form, referral_likely: v})} />
      </Field>

      <Field label="Phone Number">
        {selectedDoc?.mobile && <p className="text-xs text-gray-600 mb-1">On file: {selectedDoc.mobile}</p>}
        <ChipGroup options={['Already on file','Got today','Not given']}
          value={form.phone_status === 'on_file' ? 'Already on file' : form.phone_status === 'got_today' ? 'Got today' : form.phone_status === 'not_given' ? 'Not given' : ''}
          onChange={v => setForm({...form, phone_status: v === 'Already on file' ? 'on_file' : v === 'Got today' ? 'got_today' : 'not_given'})} />
        {form.phone_status === 'got_today' && (
          <input className="input mt-2" type="tel" maxLength="10" placeholder="Enter 10-digit number"
            value={form.phone_captured}
            onChange={e => setForm({...form, phone_captured: e.target.value.replace(/\D/g,'')})} />
        )}
      </Field>

      <Field label="Suspicious cancer cases per month">
        <ChipGroup options={['1-2','3-5','more','quarterly','rarely']}
          value={form.suspicious_cases} onChange={v => setForm({...form, suspicious_cases: v})} />
      </Field>

      <Field label="Stump Question / Anything new he asked">
        <textarea className="input" rows="2" value={form.stump_question}
          onChange={e => setForm({...form, stump_question: e.target.value})} />
      </Field>

      <Field label="Notes"><textarea className="input" rows="2" value={form.notes}
        onChange={e => setForm({...form, notes: e.target.value})} /></Field>

      <Field label="Next follow-up date">
        <input type="date" className="input" value={form.next_followup}
          min={new Date().toISOString().split('T')[0]}
          onChange={e => setForm({...form, next_followup: e.target.value})} />
      </Field>

      <div className="bg-white p-3 rounded card-shadow">
        <label className="flex items-center gap-2 text-sm">
          <input type="checkbox" checked={form.update_visit_time}
            onChange={e => setForm({...form, update_visit_time: e.target.checked})} />
          Update best visit time for this doctor?
        </label>
        {form.update_visit_time && (
          <div className="space-y-2 mt-2">
            <p className="text-xs">Days:</p>
            <ChipGroup options={DAYS} multi value={form.visit_days}
              onChange={v => setForm({...form, visit_days: v})} />
            <p className="text-xs mt-2">Time slots:</p>
            <ChipGroup options={HOURS} multi value={form.visit_hours}
              onChange={v => setForm({...form, visit_hours: v})} />
          </div>
        )}
      </div>

      {gps && <p className="text-xs text-gray-500">📍 GPS captured</p>}

      <button onClick={submit} disabled={saving}
        className="w-full cion-accent text-white py-4 rounded-lg font-bold text-lg disabled:opacity-50">
        {saving ? 'Saving...' : 'Submit Visit ✓'}
      </button>
      <button onClick={() => goto('home')} className="w-full bg-gray-300 py-2 rounded">Cancel</button>
    </div>
  );
}

function Quiz({ lessonId, user, goto }) {
  const [questions, setQuestions] = useState([]);
  const [answers, setAnswers] = useState({});
  const [submitted, setSubmitted] = useState(false);
  const [score, setScore] = useState(0);

  useEffect(() => { db.getQuizQuestions(lessonId).then(setQuestions); }, [lessonId]);

  const submit = async () => {
    let s = 0;
    questions.forEach(q => { if (answers[q.id] === q.correct_index) s++; });
    setScore(s);
    setSubmitted(true);
    const passed = (s / questions.length) >= 0.7;
    await db.logQuizAttempt({
      rep_id: user.id, lesson_id: lessonId,
      score: s, total: questions.length, passed
    });
  };

  if (questions.length === 0) return (
    <div className="space-y-3">
      <button onClick={() => goto('learn')} className="text-sm text-purple-700 underline">← Back</button>
      <p className="text-gray-500">No quiz available yet for this lesson.</p>
    </div>
  );

  if (submitted) {
    const passed = (score / questions.length) >= 0.7;
    return (
      <div className="space-y-4">
        <div className={'p-6 rounded-lg text-center text-white ' + (passed ? 'bg-green-600' : 'bg-red-600')}>
          <p className="text-4xl font-bold">{score}/{questions.length}</p>
          <p className="mt-2">{passed ? '✓ Passed!' : '✗ Try again next time'}</p>
        </div>
        <h3 className="font-bold">Review:</h3>
        {questions.map((q, i) => {
          const userAns = answers[q.id];
          const correct = q.correct_index;
          return (
            <div key={q.id} className="bg-white p-3 rounded card-shadow">
              <p className="font-semibold text-sm">{i+1}. {q.question}</p>
              {q.options.map((opt, oi) => (
                <p key={oi} className={'text-sm mt-1 ' + (oi === correct ? 'text-green-700 font-semibold' : oi === userAns ? 'text-red-700' : 'text-gray-600')}>
                  {oi === correct ? '✓ ' : oi === userAns ? '✗ ' : '  '}{opt}
                </p>
              ))}
            </div>
          );
        })}
        <button onClick={() => goto('learn')} className="w-full cion-primary text-white py-3 rounded font-bold">Done</button>
      </div>
    );
  }

  return (
    <div className="space-y-3">
      <h2 className="font-bold text-lg cion-primary-text">Quiz</h2>
      <p className="text-xs text-gray-500">Answer all 10. Pass = 70%+</p>
      {questions.map((q, i) => (
        <div key={q.id} className="bg-white p-3 rounded card-shadow">
          <p className="font-semibold text-sm mb-2">{i+1}. {q.question}</p>
          {q.options.map((opt, oi) => (
            <label key={oi} className="flex items-start gap-2 py-1 cursor-pointer">
              <input type="radio" name={'q' + q.id} checked={answers[q.id] === oi}
                onChange={() => setAnswers({...answers, [q.id]: oi})} />
              <span className="text-sm">{opt}</span>
            </label>
          ))}
        </div>
      ))}
      <button onClick={submit}
        disabled={Object.keys(answers).length < questions.length}
        className="w-full cion-accent text-white py-3 rounded-lg font-bold disabled:opacity-50">
        Submit Quiz
      </button>
    </div>
  );
}

  const [form, setForm] = useState({ patient_name:'', referred_by_doctor:'', influenced_by_rep:'', zone_id:'', notes:'' });
  const [saving, setSaving] = useState(false);

  useEffect(() => {
    db.getDoctors().then(setDoctors);
    db.getReps().then(r => setReps(r.filter(x => x.role === 'rep')));
    db.getZones().then(setZones);
  }, []);

  const submit = async () => {
    if (!form.patient_name) { alert('Patient name required'); return; }
    setSaving(true);
    const payload = {
      ...form,
      zone_id: form.zone_id ? parseInt(form.zone_id) : null,
      referred_by_doctor: form.referred_by_doctor || null,
      influenced_by_rep: form.influenced_by_rep || null
    };
    const { error } = await db.addReferral(payload);
    setSaving(false);
    if (error) { alert('Error: ' + error.message); return; }
    alert('Referral logged ✓');
    goto('dashboard');
  };

  return (
    <div className="space-y-3">
      <button onClick={() => goto('dashboard')} className="text-sm text-purple-700 underline">← Back</button>
      <h2 className="font-bold text-lg cion-primary-text">Log Referral</h2>
      <Field label="Patient Name *"><input className="input" value={form.patient_name}
        onChange={e => setForm({...form, patient_name: e.target.value})} /></Field>
      <Field label="Referred by Doctor">
        <select className="input" value={form.referred_by_doctor}
          onChange={e => setForm({...form, referred_by_doctor: e.target.value})}>
          <option value="">None</option>
          {doctors.map(d => <option key={d.id} value={d.id}>{d.name}</option>)}
        </select>
      </Field>
      <Field label="Influenced by Rep">
        <select className="input" value={form.influenced_by_rep}
          onChange={e => setForm({...form, influenced_by_rep: e.target.value})}>
          <option value="">None</option>
          {reps.map(r => <option key={r.id} value={r.id}>{r.name}</option>)}
        </select>
      </Field>
      <Field label="Zone">
        <select className="input" value={form.zone_id}
          onChange={e => setForm({...form, zone_id: e.target.value})}>
          <option value="">None</option>
          {zones.map(z => <option key={z.id} value={z.id}>{z.name}</option>)}
        </select>
      </Field>
      <Field label="Notes"><textarea className="input" rows="2" value={form.notes}
        onChange={e => setForm({...form, notes: e.target.value})} /></Field>
      <button onClick={submit} disabled={saving}
        className="w-full cion-accent text-white py-3 rounded-lg font-bold disabled:opacity-50">
        {saving ? 'Saving...' : 'Save Referral'}
      </button>
    </div>
  );
}

function Field({ label, children }) {
  return (
    <label className="block">
      <span className="text-xs font-semibold text-gray-600 mb-1 block">{label}</span>
      {children}
    </label>
  );
}

function StatBox({ label, val }) {
  return (
    <div className="bg-white p-3 rounded-lg card-shadow text-center">
      <p className="text-xs text-gray-500">{label}</p>
      <p className="text-2xl font-bold cion-primary-text">{val}</p>
    </div>
  );
}

function BottomNav({ screen, goto, isAdmin }) {
  const items = [
    ['home', '🏠', 'Home'],
    ['doctors', '👨‍⚕️', 'Doctors'],
    ['learn', '🎓', 'Learn']
  ];
  if (isAdmin) items.push(['dashboard', '📊', 'Dashboard']);
  return (
    <nav className="fixed bottom-0 left-0 right-0 bg-white border-t flex justify-around py-2 card-shadow">
      {items.map(([key, icon, label]) => (
        <button key={key} onClick={() => goto(key)}
          className={'flex flex-col items-center p-1 ' + (screen === key ? 'cion-primary-text' : 'text-gray-500')}>
          <span className="text-xl">{icon}</span>
          <span className="text-xs">{label}</span>
        </button>
      ))}
    </nav>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>

<script>
if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('sw.js').catch(() => {});
  });
}
</script>
</body>
</html>
