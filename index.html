function parseMarkdown(text) {
  if (!text) return '';
  let safe = text.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
  safe = safe.replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>');
  safe = safe.replace(/(^|[^*])\*([^*]+?)\*(?!\*)/g, '$1<em>$2</em>');
  safe = safe.replace(/\n/g, '<br/>');
  return safe;
}

function distanceMeters(lat1, lng1, lat2, lng2) {
  const R = 6371000;
  const toRad = d => d * Math.PI / 180;
  const dLat = toRad(lat2 - lat1);
  const dLng = toRad(lng2 - lng1);
  const a = Math.sin(dLat/2)**2 + Math.cos(toRad(lat1)) * Math.cos(toRad(lat2)) * Math.sin(dLng/2)**2;
  return 2 * R * Math.asin(Math.sqrt(a));
}

function isIncomplete(d) {
  if (!d) return [];
  const missing = [];
  if (!d.mobile || d.mobile.length < 10) missing.push('Mobile');
  if (!d.specialty) missing.push('Specialty');
  if (!d.clinic_name) missing.push('Clinic name');
  if (!d.zone_id) missing.push('Zone');
  if (!d.visit_days || d.visit_days.length === 0) missing.push('Visit days');
  return missing;
}

  async getDoctors(repId = null, isAdmin = false, includeClosed = false) {
    let q = supa.from('doctors').select('*, zones(name), reps:created_by(name)');
    if (!includeClosed) q = q.or('is_closed.is.null,is_closed.eq.false');
    if (isAdmin || !repId) {
      const { data } = await q.order('score', { ascending: false });
      return data || [];
    }
    const { data: created } = await q.eq('created_by', repId);
    const { data: visited } = await supa.from('visits').select('doctor_id').eq('rep_id', repId);
    const visitedIds = [...new Set((visited || []).map(v => v.doctor_id))];
    let extra = [];
    if (visitedIds.length) {
      const { data } = await supa.from('doctors').select('*, zones(name), reps:created_by(name)').in('id', visitedIds);
      extra = (data || []).filter(d => !includeClosed ? !d.is_closed : true);
    }
    const merged = [...(created || []), ...extra.filter(e => !(created || []).find(c => c.id === e.id))];
    return merged.sort((a, b) => (b.score || 0) - (a.score || 0));
  },

    const docs = await this.getDoctors(repId, isAdmin);

  async getHighPotential(repId, isAdmin) {
    const docs = await this.getDoctors(repId, isAdmin);
    const cutoff = new Date(Date.now() - HIGH_POTENTIAL_DAYS * 24 * 3600 * 1000);
    const result = [];
    for (const d of docs) {
      if (d.score < HIGH_POTENTIAL_MIN_SCORE) continue;
      if (d.is_closed) continue;
      const { data: lastVisit } = await supa.from('visits').select('visited_at').eq('doctor_id', d.id).order('visited_at', { ascending: false }).limit(1).maybeSingle();
      if (!lastVisit || new Date(lastVisit.visited_at) < cutoff) {
        result.push({ ...d, last_visit: lastVisit?.visited_at });
      }
    }
    return result.slice(0, 5);
  },
  async getAdminYesterdayReport() {
    const visits = await this.getYesterdayVisits(null, true);
    const { data: reps } = await supa.from('reps').select('*').eq('role', 'rep').eq('active', true);
    const repActivity = {};
    (reps || []).forEach(r => repActivity[r.id] = { name: r.name, visits: 0, met: 0 });
    visits.forEach(v => {
      if (repActivity[v.rep_id]) {
        repActivity[v.rep_id].visits++;
        if (v.met_status === 'doctor') repActivity[v.rep_id].met++;

    });
    const activeReps = Object.values(repActivity).filter(r => r.visits > 0).length;
    return {
      totalVisits: visits.length,
      totalMet: visits.filter(v => v.met_status === 'doctor').length,
      activeReps, totalReps: (reps || []).length,
      repActivity: Object.values(repActivity)

    const { data: visits } = await supa.from('visits').select('*, doctors(id, name)').eq('rep_id', repId).gte('visited_at', since).order('visited_at', { ascending: false });

    (visits || []).forEach(v => {

      if (d.getDay() !== 0) workedDates.add(d.toDateString());

    return { visits: visits || [], addedDocs: addedDocs || [], attempts: attempts || [], referrals: referrals || [], daysWorked: workedDates.size };

    const { data: visits } = await supa.from('visits').select('gps_lat, visited_at').eq('rep_id', repId).gte('visited_at', since);
    const totalDays = days;
    const daysByGps = {};
    (visits || []).forEach(v => {
      const d = new Date(v.visited_at).toDateString();
      if (!daysByGps[d]) daysByGps[d] = { total: 0, withGps: 0 };
      daysByGps[d].total++;

    const noGpsDays = Object.values(daysByGps).filter(d => d.total > 0 && d.withGps === 0).length;

  async logDailyLearning(repId, lessonId, score, total) {
    const today = new Date().toISOString().split('T')[0];
    return await supa.from('daily_learning_completion').upsert([{
      rep_id: repId, completion_date: today, lesson_id: lessonId, score, total
    }], { onConflict: 'rep_id,completion_date' });
  },
  async getLearningStreak(repId) {
    const { data } = await supa.from('daily_learning_completion').select('completion_date').eq('rep_id', repId).order('completion_date', { ascending: false }).limit(60);
    if (!data || data.length === 0) return 0;
    let streak = 0;
    let cursor = new Date();
    cursor.setHours(0,0,0,0);
    const dates = new Set(data.map(r => r.completion_date));
    while (true) {
      if (cursor.getDay() === 0) { cursor.setDate(cursor.getDate() - 1); continue; }
      const ds = cursor.toISOString().split('T')[0];
      if (dates.has(ds)) {
        streak++;
        cursor.setDate(cursor.getDate() - 1);
      } else break;
    }
    return streak;
  },
  async getLearningSummary(repId) {
    const { data } = await supa.from('daily_learning_completion').select('completion_date').eq('rep_id', repId).order('completion_date', { ascending: false });
    const lastDate = data && data.length ? data[0].completion_date : null;
    const streak = await this.getLearningStreak(repId);
    let missedDays = 0;
    const dateSet = new Set((data || []).map(r => r.completion_date));
    const cursor = new Date();
    cursor.setHours(0,0,0,0);
    cursor.setDate(cursor.getDate() - 1);
    for (let i = 0; i < 7; i++) {
      if (cursor.getDay() !== 0) {
        const ds = cursor.toISOString().split('T')[0];
        if (!dateSet.has(ds)) missedDays++;
      }
      cursor.setDate(cursor.getDate() - 1);
    }
    return { lastDate, streak, missedDays };
  },
  async getCompetitorMap() {
    const { data: docs } = await supa.from('doctors').select('refers_to, specialty, zones(name)').not('refers_to','is',null).neq('refers_to','');
    return docs || [];
  },
  async getStumpsAdmin() {
    const { data } = await supa.from('visits')
      .select('id, stump_question, stump_answer, stump_answered_at, visited_at, doctor_id, rep_id, doctors(name), reps(name)')
      .not('stump_question','is',null).neq('stump_question','')
      .order('visited_at', { ascending: false });
    return data || [];
  },
  async answerStump(visitId, answer, answeredBy) {
    return await supa.from('visits').update({
      stump_answer: answer,
      stump_answered_at: new Date().toISOString()
    }).eq('id', visitId);
  },
  async getStumpsForRep(repId) {
    const { data } = await supa.from('visits')
      .select('id, stump_question, stump_answer, stump_answered_at, visited_at, doctors(name)')
      .eq('rep_id', repId)
      .not('stump_question','is',null).neq('stump_question','')
      .order('visited_at', { ascending: false }).limit(20);
    return data || [];
  },
  async getAllAnsweredStumps() {
    const { data } = await supa.from('visits')
      .select('id, stump_question, stump_answer, stump_answered_at, doctors(name), reps(name)')
      .not('stump_answer','is',null).neq('stump_answer','')
      .order('stump_answered_at', { ascending: false }).limit(50);
    return data || [];
  }
};

const scoring = {
  suspiciousPoints(suspicious_cases) {
    const map = { '1-2': 5, '3-5': 12, 'more': 18, 'quarterly': 3, 'rarely': 0 };
    return map[suspicious_cases] || 0;
  },
  calculate(doc, lastVisit = null) {
    let interest = 0, load = 0, fit = 0, warmth = 0, topics = 0, suspicious = 0, activeRefer = 0;
    if (lastVisit && lastVisit.interest) interest = (lastVisit.interest / 5) * 30;
    const loadMap = { 'Empty': 4, 'Few': 10, 'Steady': 16, 'Packed': 20 };
    load = loadMap[doc.waiting_room] || 0;
    const highFit = ['GP','Physician','ENT','Gynae','General Surgeon','Dentist','Maxillofacial','Small Hospital'];
    if (highFit.includes(doc.specialty)) fit = 12;
    else if (doc.specialty) fit = 6;
    if (lastVisit) {
      if (lastVisit.met_status === 'doctor') warmth += 5;
      if (lastVisit.referral_likely === 'yes') warmth += 3;
      if (Array.isArray(lastVisit.topics_asked)) topics = Math.min(12, lastVisit.topics_asked.length * 1.5);
      if (lastVisit.suspicious_cases) suspicious = scoring.suspiciousPoints(lastVisit.suspicious_cases);
    }
    if (doc.refers_to && doc.refers_to.trim().length > 0) activeRefer = 10;
    return Math.min(100, Math.round(interest + load + fit + warmth + topics + suspicious + activeRefer));
  },
  tier(score) {
    if (score >= 70) return 'A';
    if (score >= 40) return 'B';
    return 'C';
  }
};

const queue = {
  key: 'cion_offline_queue',
  add(item) {
    const q = this.all();
    q.push({ ...item, queuedAt: Date.now() });
    localStorage.setItem(this.key, JSON.stringify(q));
  },
  all() { try { return JSON.parse(localStorage.getItem(this.key) || '[]'); } catch { return []; } },
  async sync() {
    const items = this.all();
    if (items.length === 0) return 0;
    let synced = 0;
    const failed = [];
    for (const item of items) {
      try {
        if (item.type === 'visit') await supa.from('visits').insert([item.data]);
        else if (item.type === 'doctor') await supa.from('doctors').insert([item.data]);
        else if (item.type === 'pending_edit') await supa.from('pending_edits').insert([item.data]);
        synced++;
      } catch (e) { failed.push(item); }
    }
    localStorage.setItem(this.key, JSON.stringify(failed));
    return synced;
  }
};

const { useState, useEffect, useRef, useCallback } = React;

function useHistoryStack(initialScreen = 'home') {
  const [stack, setStack] = useState([{ screen: initialScreen, params: {} }]);
  const poppingRef = useRef(false);

  const push = useCallback((screen, params = {}) => {
    setStack(prev => [...prev, { screen, params }]);
    window.history.pushState({ screen, params }, '', window.location.href);
  }, []);

  const pop = useCallback(() => {
    setStack(prev => prev.length > 1 ? prev.slice(0, -1) : prev);
  }, []);

  const replace = useCallback((screen, params = {}) => {
    setStack([{ screen, params }]);
    window.history.replaceState({ screen, params }, '', window.location.href);
  }, []);

  useEffect(() => {
    const onPop = (e) => {
      if (poppingRef.current) { poppingRef.current = false; return; }
      if (stack.length > 1) {
        pop();
      } else {
        const leave = confirm('Exit the app?');
        if (!leave) {
          poppingRef.current = true;
          window.history.pushState({ screen: 'home', params: {}, sentinel: true }, '', window.location.href);
        } else {
          window.history.back();
        }
      }
    };
    window.addEventListener('popstate', onPop);
    return () => window.removeEventListener('popstate', onPop);
  }, [stack.length, pop]);

  const current = stack[stack.length - 1];
  return { current, push, pop, replace, stack };
}

function App() {
  const [currentUser, setCurrentUser] = useState(() => auth.getUser());
  const [online, setOnline] = useState(navigator.onLine);
  const [pendingCount, setPendingCount] = useState(queue.all().length);
  const history = useHistoryStack('home');

  useEffect(() => {
    const onOnline = async () => {
      setOnline(true);
      const n = await queue.sync();
      setPendingCount(queue.all().length);
      if (n > 0) alert('Synced ' + n + ' pending items.');
    };
    const onOffline = () => setOnline(false);
    window.addEventListener('online', onOnline);
    window.addEventListener('offline', onOffline);
    return () => {
      window.removeEventListener('online', onOnline);
      window.removeEventListener('offline', onOffline);
    };
  }, []);

  useEffect(() => {
    window.history.replaceState({ screen: 'home', params: {} }, '', window.location.href);
    window.history.pushState({ screen: 'home', params: {}, sentinel: true }, '', window.location.href);
  }, []);

  const handleLogin = (rep, remember) => {
    setCurrentUser(rep);
    auth.setUser(rep, remember);
    history.replace('home');
  };
  const handleLogout = () => {
    if (!confirm('Logout?')) return;
    setCurrentUser(null);
    auth.clear();
    history.replace('home');
  };
  const goto = (s, params = {}) => history.push(s, params);
  const goBack = () => {
    if (history.stack.length > 1) {
      history.pop();
      window.history.back();
    } else {
      goto('home');
    }
  };

  if (!currentUser) return <Login onLogin={handleLogin} />;
  const isAdmin = currentUser.role === 'admin';
  const screen = history.current.screen;
  const screenParams = history.current.params;

  return (

function ProgressRing({ value, max, size = 80, stroke = 8 }) {
  const pct = Math.min(100, Math.round((value / max) * 100));
  const radius = (size - stroke) / 2;
  const circ = radius * 2 * Math.PI;
  const offset = circ - (pct / 100) * circ;
  return (
    <svg width={size} height={size}>
      <circle cx={size/2} cy={size/2} r={radius} fill="none" stroke="#e5e7eb" strokeWidth={stroke} />
      <circle className="progress-ring" cx={size/2} cy={size/2} r={radius} fill="none"
        stroke="#4B1E6B" strokeWidth={stroke} strokeDasharray={circ} strokeDashoffset={offset} strokeLinecap="round" />
      <text x="50%" y="50%" textAnchor="middle" dy="0.35em" fontSize="16" fontWeight="bold" fill="#4B1E6B">
        {value}/{max}
      </text>
    </svg>
  );
}

function ChipGroup({ options, value, onChange, multi = false, getLabel = null }) {
  const arr = multi ? (value || []) : value;
  const isOn = (o) => multi ? arr.includes(o) : arr === o;
  const toggle = (o) => {
    if (multi) {
      const next = arr.includes(o) ? arr.filter(x => x !== o) : [...arr, o];
      onChange(next);
    } else onChange(o);
  };
  return (
    <div className="flex flex-wrap gap-1">
      {options.map(o => (
        <span key={o} className={'chip ' + (isOn(o) ? 'chip-on' : 'chip-off')} onClick={() => toggle(o)}>
          {getLabel ? getLabel(o) : o}
        </span>
      ))}
    </div>
  );
}

function InterestPicker({ value, onChange }) {
  return (
    <div className="grid grid-cols-2 gap-2">
      {INTEREST_OPTIONS.map(opt => (
        <button key={opt.value} type="button" onClick={() => onChange(opt.value)}
          className={'p-2 rounded border-2 text-sm font-semibold ' + (value === opt.value ? opt.cls : 'bg-white border-gray-200 text-gray-500')}>
          {opt.label}
        </button>
      ))}
    </div>
  );
}

function DoctorForm({ user, goto, goBack, doctorId = null }) {
  const isEdit = !!doctorId;
  const isAdmin = user.role === 'admin';
  const [zones, setZones] = useState([]);
  const [original, setOriginal] = useState(null);
  const [dupes, setDupes] = useState([]);
  const [form, setForm] = useState({
    name: '', mobile: '', specialty: '', clinic_name: '', zone_id: '',
    op_fee: '', waiting_room: '', area_class: '',
    does_biopsy_inhouse: '',
    refers_to: '', visit_days: [], visit_hours: []
  });
  const [saving, setSaving] = useState(false);

  useEffect(() => {
    db.getZones().then(setZones);
    if (isEdit) {
      db.getDoctorById(doctorId).then(d => {
        if (d) {
          setOriginal(d);
          setForm({
            name: d.name || '', mobile: d.mobile || '', specialty: d.specialty || '',
            clinic_name: d.clinic_name || '', zone_id: d.zone_id || '',
            op_fee: d.op_fee || '', waiting_room: d.waiting_room || '', area_class: d.area_class || '',
            does_biopsy_inhouse: d.does_biopsy_inhouse || '',
            refers_to: d.refers_to || '',
            visit_days: d.visit_days || [], visit_hours: d.visit_hours || []
          });
        }
      });
    }
  }, [doctorId]);

  useEffect(() => {
    if (!isEdit && form.name.length > 2 && form.zone_id) {
      db.checkDuplicateDoctor(form.name, parseInt(form.zone_id), user.id).then(setDupes);
    } else { setDupes([]); }
  }, [form.name, form.zone_id, isEdit, user.id]);

  const submit = async () => {
    if (!form.name || !form.specialty || !form.zone_id) { alert('Name, Specialty, Zone required'); return; }
    setSaving(true);
    const payload = {
      ...form,
      op_fee: form.op_fee ? parseInt(form.op_fee) : null,
      zone_id: form.zone_id ? parseInt(form.zone_id) : null,
      does_biopsy_inhouse: form.does_biopsy_inhouse || null
    };

    if (isEdit) {
      const changes = {};
      Object.keys(payload).forEach(k => {
        if (JSON.stringify(payload[k]) !== JSON.stringify(original[k])) changes[k] = payload[k];
      });
      if (original.is_stub) changes.is_stub = false;
      if (Object.keys(changes).length === 0) { alert('No changes'); setSaving(false); return; }

      if (isAdmin) {
        await db.updateDoctor(doctorId, changes);
        alert('Updated');
      } else {
        if (original.is_stub) {
          await db.updateDoctor(doctorId, changes);
          alert('Doctor details completed');
        } else {
          if (!navigator.onLine) {
            queue.add({ type: 'pending_edit', data: { doctor_id: doctorId, rep_id: user.id, changes }});
            alert('Edit queued offline.');
          } else {
            await db.addPendingEdit(doctorId, user.id, changes);
            alert('Edit submitted for admin approval.');
          }
        }
      }
      setSaving(false);
      goBack();
      return;
    }

    payload.created_by = user.id;
    payload.score = 0;
    payload.tier = 'C';
    payload.is_stub = false;

    if (!navigator.onLine) {
      queue.add({ type: 'doctor', data: payload });
      alert('Saved offline.');
      setSaving(false);
      goBack();
      return;
    }
    const { error } = await db.addDoctor(payload);
    setSaving(false);
    if (error) { alert('Error: ' + error.message); return; }
    goBack();
  };

  return (
    <div className="space-y-3">
      <BackButton goBack={goBack} />
      <h2 className="font-bold text-lg cion-primary-text">{isEdit ? 'Edit Doctor' : 'Add New Doctor'}</h2>
      {isEdit && !isAdmin && original && !original.is_stub && <p className="text-xs bg-yellow-100 p-2 rounded">Edits need admin approval.</p>}
      {isEdit && original?.is_stub && <p className="text-xs bg-orange-100 p-2 rounded">Complete this doctor's details.</p>}

      <Field label="Doctor Name *"><input className="input" value={form.name} onChange={e => setForm({...form, name: e.target.value})} /></Field>

      {dupes.length > 0 && (
        <div className="bg-yellow-100 border-l-4 border-yellow-500 p-2 rounded">
          <p className="text-xs font-semibold text-yellow-800">Possible duplicate(s):</p>
          {dupes.map(d => <p key={d.id} className="text-xs">{d.name} - {d.clinic_name} - {d.specialty}</p>)}
        </div>
      )}

      <Field label="Specialty *"><select className="input" value={form.specialty} onChange={e => setForm({...form, specialty: e.target.value})}>
        <option value="">Select...</option>
        {SPECIALTIES.map(s => <option key={s}>{s}</option>)}
      </select></Field>

      <Field label="Zone *"><select className="input" value={form.zone_id} onChange={e => setForm({...form, zone_id: e.target.value})}>
        <option value="">Select...</option>
        {zones.map(z => <option key={z.id} value={z.id}>{z.name}</option>)}
      </select></Field>

      <Field label="Mobile (10-digit) *"><input className="input" type="tel" maxLength="10" value={form.mobile} onChange={e => setForm({...form, mobile: e.target.value.replace(/\D/g,'')})} /></Field>
      <Field label="Clinic Name *"><input className="input" value={form.clinic_name} onChange={e => setForm({...form, clinic_name: e.target.value})} /></Field>

function LogVisit({ user, goto, goBack, preDoctorId = null }) {
  const [doctors, setDoctors] = useState([]);
  const [zones, setZones] = useState([]);
  const [zoneId, setZoneId] = useState('');
  const [doctorId, setDoctorId] = useState(preDoctorId || '');
  const [showQuickAdd, setShowQuickAdd] = useState(false);
  const [quickForm, setQuickForm] = useState({ name: '', specialty: '' });
  const [form, setForm] = useState({
    met_status: '', time_spent: '', interest: null, referral_likely: '',
    phone_status: '', phone_captured: '', suspicious_cases: '',
    topics_asked: [], stump_question: '', next_followup: ''
  });
  const [gps, setGps] = useState(null);
  const [saving, setSaving] = useState(false);
  const [feedback, setFeedback] = useState(null);
  const [locationWarning, setLocationWarning] = useState(null);
  const isAdmin = user.role === 'admin';

  const loadDocs = async () => {
    const d = await db.getDoctors(user.id, isAdmin);
    setDoctors(d);
    return d;
  };

  useEffect(() => {
    (async () => {
      const d = await loadDocs();
      const z = await db.getZones();
      setZones(z);
      if (preDoctorId) {
        const doc = d.find(x => x.id === preDoctorId);
        if (doc?.zone_id) setZoneId(String(doc.zone_id));
      }
    })();
    if (navigator.geolocation) {
      navigator.geolocation.getCurrentPosition(
        p => setGps({ lat: p.coords.latitude, lng: p.coords.longitude }),
        () => setGps(null), { timeout: 5000 }
      );
    }
  }, [user.id]);

  const filteredDoctors = zoneId ? doctors.filter(d => String(d.zone_id) === zoneId) : doctors;
  const selectedDoc = doctors.find(d => d.id === doctorId);

  const quickAdd = async () => {
    if (!quickForm.name || !quickForm.specialty || !zoneId) { alert('Name, specialty, zone required'); return; }
    const payload = {
      name: quickForm.name, specialty: quickForm.specialty, zone_id: parseInt(zoneId),
      created_by: user.id, score: 0, tier: 'C', is_stub: true
    };
    const { data, error } = await db.addDoctor(payload);
    if (error) { alert('Error: ' + error.message); return; }
    await loadDocs();
    setDoctorId(data.id);
    setShowQuickAdd(false);
    setQuickForm({ name: '', specialty: '' });
  };

  const checkSameLocation = async () => {
    if (!gps) return false;
    const recent = await db.getRecentVisitsForLocationCheck(user.id, SAME_LOCATION_TIME_MIN);
    let nearbyCount = 0;
    for (const r of recent) {
      const d = distanceMeters(gps.lat, gps.lng, r.gps_lat, r.gps_lng);
      if (d <= SAME_LOCATION_THRESHOLD_M) nearbyCount++;
    }
    return nearbyCount >= 2;
  };

  const submit = async () => {
    if (!doctorId) { alert('Select a doctor'); return; }
    if (!form.met_status) { alert('Mark met status'); return; }
    if (!form.interest) { alert('Pick interest level'); return; }

    setSaving(true);

    const sameLoc = await checkSameLocation();
    if (sameLoc && !locationWarning) {
      setLocationWarning(true);
      setSaving(false);
      return;
    }

    const visit = {
      doctor_id: doctorId, rep_id: user.id, visit_type: 'followup',
      met_status: form.met_status, time_spent: form.time_spent,
      interest: parseInt(form.interest), referral_likely: form.referral_likely,
      phone_status: form.phone_status || null,
      phone_captured: form.phone_status === 'got_today' ? form.phone_captured : null,
      suspicious_cases: form.suspicious_cases || null,
      topics_asked: form.topics_asked,
      stump_question: form.stump_question,
      next_followup: form.next_followup || null,
      gps_lat: gps?.lat, gps_lng: gps?.lng,
      same_location_flag: sameLoc
    };

    if (!navigator.onLine) {
      queue.add({ type: 'visit', data: visit });
      alert('Saved offline.');
      goto('home');
      return;
    }

    const { error } = await db.addVisit(visit);
    if (error) { alert('Error: ' + error.message); setSaving(false); return; }

    let oldTier = selectedDoc?.tier || 'C', oldScore = selectedDoc?.score || 0;
    let newScore = oldScore, newTier = oldTier;
    if (selectedDoc) {
      newScore = scoring.calculate(selectedDoc, visit);
      newTier = scoring.tier(newScore);
      const updates = { score: newScore, tier: newTier, next_followup: visit.next_followup };
      if (form.phone_status === 'got_today' && form.phone_captured) updates.mobile = form.phone_captured;
      await db.updateDoctor(doctorId, updates);
    }

    setSaving(false);
    setFeedback({
      doctorName: selectedDoc?.name, oldTier, newTier, oldScore, newScore,
      pointsGained: newScore - oldScore, topicsAsked: form.topics_asked,
      nextFollowup: form.next_followup, stumpQ: form.stump_question
    });
  };

  if (locationWarning && !feedback) {
    return (
      <div className="space-y-3">
        <div className="bg-orange-100 border-l-4 border-orange-500 p-4 rounded">
          <p className="font-bold text-orange-800">Same Location Warning</p>
          <p className="text-sm text-orange-700 mt-2">
            You've logged 2+ other visits within {SAME_LOCATION_THRESHOLD_M}m of this location in the last hour.
            Confirm you're physically at the doctor's clinic.
          </p>
        </div>
        <button onClick={async () => { setLocationWarning('confirmed'); await submit(); }}
          className="w-full cion-primary text-white py-3 rounded font-bold">Yes, I'm at the clinic - submit</button>
        <button onClick={() => { setLocationWarning(null); }}
          className="w-full bg-gray-300 py-2 rounded">Cancel - log later</button>
      </div>
    );
  }

  if (feedback) {
    const tierUp = ['C','B','A'].indexOf(feedback.newTier) > ['C','B','A'].indexOf(feedback.oldTier);
    const tierDown = ['C','B','A'].indexOf(feedback.newTier) < ['C','B','A'].indexOf(feedback.oldTier);
    return (
      <div className="space-y-3">
        <div className="bg-green-100 border-l-4 border-green-600 p-4 rounded">
          <p className="font-bold text-green-800">Visit Logged for {feedback.doctorName}</p>
        </div>
        <div className="bg-white p-4 rounded card-shadow space-y-3">
          <h3 className="font-bold cion-primary-text">Visit Feedback</h3>
          <div className="flex justify-between items-center">
            <span className="text-sm">Score</span>
            <span className="font-bold">
              {feedback.oldScore} -&gt; {feedback.newScore}
              {feedback.pointsGained > 0 && <span className="text-green-700"> (+{feedback.pointsGained})</span>}
              {feedback.pointsGained < 0 && <span className="text-red-700"> ({feedback.pointsGained})</span>}
            </span>
          </div>
          <div className="flex justify-between items-center">
            <span className="text-sm">Tier</span>
            <span className="font-bold">
              {feedback.oldTier} -&gt; {feedback.newTier}
              {tierUp && <span className="text-green-700"> (upgraded)</span>}
              {tierDown && <span className="text-red-700"> (down)</span>}
            </span>
          </div>
          {feedback.nextFollowup && <p className="text-sm">Next: {feedback.nextFollowup}</p>}
          {feedback.stumpQ && (
            <div className="bg-yellow-50 p-2 rounded">
              <p className="text-xs font-semibold">Doctor's Question logged</p>
              <p className="text-xs italic">"{feedback.stumpQ}"</p>
              <p className="text-xs text-gray-500 mt-1">Admin will answer soon</p>
            </div>
          )}
          <p className="text-xs text-gray-500">{TIER_GUIDANCE[feedback.newTier].advice}</p>
        </div>
        <button onClick={() => goto('home')} className="w-full cion-primary text-white py-3 rounded font-bold">Done</button>
      </div>
    );
  }

  return (
    <div className="space-y-3">
      <BackButton goBack={goBack} />
      <h2 className="font-bold text-lg cion-primary-text">Log Visit</h2>

      <Field label="Area / Zone *">
        <select className="input" value={zoneId} onChange={e => { setZoneId(e.target.value); setDoctorId(''); }}>
          <option value="">Select area first...</option>
          {zones.map(z => <option key={z.id} value={z.id}>{z.name}</option>)}
        </select>
      </Field>

      <Field label="Doctor *">
        <select className="input" value={doctorId} onChange={e => setDoctorId(e.target.value)} disabled={!zoneId}>
          <option value="">{zoneId ? 'Select doctor...' : 'Select area first'}</option>
          {filteredDoctors.map(d => <option key={d.id} value={d.id}>{d.name} - {d.clinic_name || '(no clinic)'}</option>)}
        </select>
        {zoneId && !showQuickAdd && (
          <button onClick={() => setShowQuickAdd(true)} className="text-xs text-purple-700 underline mt-1">+ Quick-add new doctor in this zone</button>
        )}
        {showQuickAdd && (
          <div className="bg-orange-50 p-3 rounded mt-2 space-y-2">
            <p className="text-xs font-semibold">Quick-add (full details can be completed later)</p>
            <input className="input" placeholder="Doctor name" value={quickForm.name} onChange={e => setQuickForm({...quickForm, name: e.target.value})} />
            <select className="input" value={quickForm.specialty} onChange={e => setQuickForm({...quickForm, specialty: e.target.value})}>
              <option value="">Specialty...</option>
              {SPECIALTIES.map(s => <option key={s}>{s}</option>)}
            </select>
            <div className="flex gap-2">
              <button onClick={quickAdd} className="flex-1 cion-primary text-white py-2 rounded text-sm">Add</button>
              <button onClick={() => setShowQuickAdd(false)} className="flex-1 bg-gray-300 py-2 rounded text-sm">Cancel</button>
            </div>
          </div>
        )}
      </Field>

      <Field label="Met status *">
        <ChipGroup options={['Doctor','Staff','Not met']}
          value={form.met_status === 'doctor' ? 'Doctor' : form.met_status === 'staff' ? 'Staff' : form.met_status === 'not_met' ? 'Not met' : ''}
          onChange={v => setForm({...form, met_status: v === 'Doctor' ? 'doctor' : v === 'Staff' ? 'staff' : 'not_met'})} />
      </Field>

      <Field label="Time spent">
        <ChipGroup options={['2min','5min','10min+']} value={form.time_spent} onChange={v => setForm({...form, time_spent: v})} />
      </Field>

      <Field label="Interest level *">
        <InterestPicker value={form.interest} onChange={v => setForm({...form, interest: v})} />
      </Field>

      <Field label="Referral likely?">
        <ChipGroup options={['yes','maybe','no']} value={form.referral_likely} onChange={v => setForm({...form, referral_likely: v})} />
      </Field>

      <Field label="Phone Number">
        {selectedDoc?.mobile && <p className="text-xs text-gray-600 mb-1">On file: {selectedDoc.mobile}</p>}
        <ChipGroup options={['Already on file','Got today','Not given']}
          value={form.phone_status === 'on_file' ? 'Already on file' : form.phone_status === 'got_today' ? 'Got today' : form.phone_status === 'not_given' ? 'Not given' : ''}
          onChange={v => setForm({...form, phone_status: v === 'Already on file' ? 'on_file' : v === 'Got today' ? 'got_today' : 'not_given'})} />
        {form.phone_status === 'got_today' && (
          <input className="input mt-2" type="tel" maxLength="10" placeholder="10-digit"
            value={form.phone_captured} onChange={e => setForm({...form, phone_captured: e.target.value.replace(/\D/g,'')})} />
        )}
      </Field>

      <Field label="Suspicious cancer cases per month">
        <ChipGroup options={['1-2','3-5','more','quarterly','rarely']} value={form.suspicious_cases} onChange={v => setForm({...form, suspicious_cases: v})} />
      </Field>

      <Field label="What did the doctor ask about?">
        <ChipGroup options={TOPICS.map(t => t.key)} getLabel={k => TOPICS.find(t => t.key === k)?.label || k}
          multi value={form.topics_asked} onChange={v => setForm({...form, topics_asked: v})} />
      </Field>

      <Field label="Doctor's Question (couldn't answer)">
        <textarea className="input" rows="2" value={form.stump_question} onChange={e => setForm({...form, stump_question: e.target.value})} />
      </Field>

      <Field label="Next follow-up date">
        <input type="date" className="input" value={form.next_followup}
          min={new Date().toISOString().split('T')[0]}
          max={new Date(Date.now() + 365 * 24 * 3600 * 1000).toISOString().split('T')[0]}
          onChange={e => setForm({...form, next_followup: e.target.value})} />
      </Field>

      {gps && <p className="text-xs text-gray-500">GPS captured</p>}
      {!gps && <p className="text-xs text-orange-600">GPS not captured - enable location</p>}

      <button onClick={submit} disabled={saving} className="w-full cion-accent text-white py-4 rounded-lg font-bold text-lg disabled:opacity-50">
        {saving ? 'Saving...' : 'Submit Visit'}
      </button>
      <button onClick={goBack} className="w-full bg-gray-300 py-2 rounded">Cancel</button>
    </div>
  );
}

function EditVisit({ user, goto, goBack, visitId }) {

  const [form, setForm] = useState(null);
  const [saving, setSaving] = useState(false);

  useEffect(() => {
    (async () => {
      const v = await db.getVisitById(visitId);
      if (!v) { alert('Visit not found'); goBack(); return; }
      if (v.rep_id !== user.id) { alert('Not your visit'); goBack(); return; }
      const ageHrs = (Date.now() - new Date(v.visited_at)) / (3600 * 1000);
      if (ageHrs > 24) { alert('Edit window expired (24h)'); goBack(); return; }
      setVisit(v);
      setForm({
        met_status: v.met_status || '', time_spent: v.time_spent || '',
        interest: v.interest || null, referral_likely: v.referral_likely || '',
        suspicious_cases: v.suspicious_cases || '', topics_asked: v.topics_asked || [],
        stump_question: v.stump_question || '', next_followup: v.next_followup || ''
      });
      const d = await db.getDoctorById(v.doctor_id);
      setDoc(d);
    })();
  }, [visitId]);

  const save = async () => {
    setSaving(true);

      next_followup: form.next_followup || null,

    if (doc) {
      const newScore = scoring.calculate(doc, { ...visit, ...form });

          value={form.met_status === 'doctor' ? 'Doctor' : form.met_status === 'staff' ? 'Staff' : form.met_status === 'not_met' ? 'Not met' : ''}
          onChange={v => setForm({...form, met_status: v === 'Doctor' ? 'doctor' : v === 'Staff' ? 'staff' : 'not_met'})} />
      </Field>
      <Field label="Time spent">
        <ChipGroup options={['2min','5min','10min+']} value={form.time_spent} onChange={v => setForm({...form, time_spent: v})} />
      </Field>
      <Field label="Interest level">
        <InterestPicker value={form.interest} onChange={v => setForm({...form, interest: v})} />
      </Field>
      <Field label="Referral likely?">
        <ChipGroup options={['yes','maybe','no']} value={form.referral_likely} onChange={v => setForm({...form, referral_likely: v})} />
      </Field>
      <Field label="Suspicious cases/month">
        <ChipGroup options={['1-2','3-5','more','quarterly','rarely']} value={form.suspicious_cases} onChange={v => setForm({...form, suspicious_cases: v})} />

function Quiz({ lessonId, user, goto, goBack, mini }) {
  const [questions, setQuestions] = useState([]);
  const [answers, setAnswers] = useState({});
  const [submitted, setSubmitted] = useState(false);
  const [score, setScore] = useState(0);

  useEffect(() => {
    db.getQuizQuestions(lessonId).then(qs => {
      if (mini && qs.length > 3) {
        const shuffled = [...qs].sort(() => Math.random() - 0.5).slice(0, 3);
        setQuestions(shuffled);
      } else {
        setQuestions(qs);
      }
    });
  }, [lessonId, mini]);

  const submit = async () => {
    let s = 0;
    questions.forEach(q => { if (answers[q.id] === q.correct_index) s++; });
    setScore(s);
    setSubmitted(true);
    if (mini) {
      await db.logDailyLearning(user.id, lessonId, s, questions.length);
    } else {
      await db.logQuizAttempt({
        rep_id: user.id, lesson_id: lessonId,
        score: s, total: questions.length, passed: (s / questions.length) >= 0.7
      });
    }
  };

  if (questions.length === 0) return (
    <div className="space-y-3">
      <BackButton goBack={goBack} />
      <p className="text-gray-500">No quiz yet.</p>
    </div>
  );

  if (submitted) {
    const passThreshold = mini ? 0.66 : 0.7;
    const passed = (score / questions.length) >= passThreshold;
    return (
      <div className="space-y-4">
        <div className={'p-6 rounded-lg text-center text-white ' + (passed ? 'bg-green-600' : 'bg-red-600')}>
          <p className="text-4xl font-bold">{score}/{questions.length}</p>
          <p className="mt-2">{passed ? (mini ? 'Daily learning done!' : 'Passed!') : 'Try next time'}</p>
          {mini && <p className="text-xs mt-2 opacity-80">Streak continues</p>}
        </div>
        {questions.map((q, i) => {
          const ua = answers[q.id]; const cor = q.correct_index;
          return (
            <div key={q.id} className="bg-white p-3 rounded card-shadow">
              <p className="font-semibold text-sm">{i+1}. {q.question}</p>
              {q.options.map((opt, oi) => (
                <p key={oi} className={'text-sm mt-1 ' + (oi === cor ? 'text-green-700 font-semibold' : oi === ua ? 'text-red-700' : 'text-gray-600')}>
                  {oi === cor ? '+ ' : oi === ua ? '- ' : '  '}{opt}
                </p>
              ))}
            </div>
          );
        })}
        <button onClick={() => goto('home')} className="w-full cion-primary text-white py-3 rounded font-bold">Done</button>
      </div>
    );
  }

  return (
    <div className="space-y-3">
      <BackButton goBack={goBack} />
      <h2 className="font-bold text-lg cion-primary-text">{mini ? 'Daily Quiz' : 'Quiz'}</h2>
      {questions.map((q, i) => (
        <div key={q.id} className="bg-white p-3 rounded card-shadow">
          <p className="font-semibold text-sm mb-2">{i+1}. {q.question}</p>
          {q.options.map((opt, oi) => (
            <label key={oi} className="flex items-start gap-2 py-1 cursor-pointer">
              <input type="radio" name={'q' + q.id} checked={answers[q.id] === oi} onChange={() => setAnswers({...answers, [q.id]: oi})} />
              <span className="text-sm">{opt}</span>
            </label>
          ))}
        </div>
      ))}
      <button onClick={submit} disabled={Object.keys(answers).length < questions.length}
        className="w-full cion-accent text-white py-3 rounded-lg font-bold disabled:opacity-50">Submit</button>
    </div>
  );
}

function Dashboard({ goto, goBack }) {
  const [stats, setStats] = useState(null);
  useEffect(() => { db.getDashboardStats().then(setStats); }, []);
  if (!stats) return <p>Loading...</p>;

  const byRep = {};
  stats.reps.forEach(r => byRep[r.id] = { id: r.id, name: r.name, visits: 0, doctorsMet: new Set(), doctorsAdded: 0, referrals: 0, sameLocFlags: 0 });
  stats.visits.forEach(v => {
    if (byRep[v.rep_id]) {
      byRep[v.rep_id].visits++;
      if (v.met_status === 'doctor') byRep[v.rep_id].doctorsMet.add(v.doctor_id);
      if (v.same_location_flag) byRep[v.rep_id].sameLocFlags++;
    }
  });
  stats.doctors.forEach(d => { if (d.created_by && byRep[d.created_by]) byRep[d.created_by].doctorsAdded++; });
  stats.referrals.forEach(r => { if (r.influenced_by_rep && byRep[r.influenced_by_rep]) byRep[r.influenced_by_rep].referrals++; });
  const tierCount = { A: 0, B: 0, C: 0 };
  stats.doctors.forEach(d => { if (d.tier) tierCount[d.tier]++; });

  return (
    <div className="space-y-4">
      <BackButton goBack={goBack} />
      <h2 className="font-bold text-lg cion-primary-text">Full Dashboard</h2>

              <td>{r.doctorsAdded}</td>
              <td>{r.visits}</td>

function RepPerformance({ goto, goBack, repId }) {
  const [data, setData] = useState(null);
  const [repName, setRepName] = useState('');
  const [days, setDays] = useState(7);
  const [learning, setLearning] = useState({ lastDate: null, streak: 0, missedDays: 0 });
  const [gpsStatus, setGpsStatus] = useState({ totalActiveDays: 0, noGpsDays: 0 });

  useEffect(() => {
    (async () => {
      const reps = await db.getReps();
      const rep = reps.find(r => r.id === repId);
      setRepName(rep?.name || '?');
      const d = await db.getRepPerformance(repId, days);
      setData(d);
      setLearning(await db.getLearningSummary(repId));
      setGpsStatus(await db.getRepGpsStatus(repId, days));
    })();
  }, [repId, days]);

  if (!data) return <p>Loading...</p>;

  const totalVisits = data.visits.length;
  const metVisits = data.visits.filter(v => v.met_status === 'doctor').length;
  const metRate = totalVisits ? Math.round((metVisits / totalVisits) * 100) : 0;
  const avgPerDay = data.daysWorked ? (totalVisits / data.daysWorked).toFixed(1) : '0';
  const hotLeadsAdded = data.addedDocs.filter(d => d.tier === 'A').length;
  const sameLocCount = data.visits.filter(v => v.same_location_flag).length;
  const stumpCount = data.visits.filter(v => v.stump_question).length;

  const flags = [];
  if (data.daysWorked < 4 && days === 7) flags.push('Only ' + data.daysWorked + ' working days in 7');
  if (metRate < 40 && totalVisits > 5) flags.push('Met rate < 40%');
  if (gpsStatus.noGpsDays > 0) flags.push('No GPS on ' + gpsStatus.noGpsDays + ' day(s) - check permissions');
  if (sameLocCount >= 3) flags.push(sameLocCount + ' visits flagged for same-location pattern');
  if (learning.missedDays >= 3) flags.push('Missed daily learning ' + learning.missedDays + ' day(s)');
  if (stumpCount > 2) flags.push(stumpCount + ' stump questions - may need training');

  return (
    <div className="space-y-4">
      <BackButton goBack={goBack} />
      <h2 className="font-bold text-lg cion-primary-text">{repName} - Performance</h2>

      <ChipGroup options={[7, 14, 30]} value={days} onChange={setDays} getLabel={d => d + ' days'} />

      <div className="grid grid-cols-2 gap-2">
        <StatBox label="Days Worked" val={`${data.daysWorked}`} />
        <StatBox label="Visits" val={totalVisits} />
        <StatBox label="Doctors Met" val={metVisits} />
        <StatBox label="Referrals" val={data.referrals.length} />
      </div>

      <div className="bg-white p-4 rounded-lg card-shadow space-y-2">
        <h3 className="font-semibold text-sm">Quality Metrics</h3>
        <div className="flex justify-between text-sm"><span>Met Rate</span><span className="font-bold">{metRate}%</span></div>
        <div className="flex justify-between text-sm"><span>Avg visits/day</span><span className="font-bold">{avgPerDay}</span></div>
        <div className="flex justify-between text-sm"><span>Hot leads added</span><span className="font-bold">{hotLeadsAdded}</span></div>
        <div className="flex justify-between text-sm"><span>New doctors added</span><span className="font-bold">{data.addedDocs.length}</span></div>
        <div className="flex justify-between text-sm"><span>Same-location flags</span><span className={'font-bold ' + (sameLocCount > 0 ? 'text-orange-600' : '')}>{sameLocCount}</span></div>
      </div>

      <div className="bg-white p-4 rounded-lg card-shadow space-y-2">
        <h3 className="font-semibold text-sm">Learning</h3>
        <div className="flex justify-between text-sm"><span>Current streak</span><span className="font-bold">{learning.streak} days</span></div>
        <div className="flex justify-between text-sm"><span>Last learning</span><span className="font-bold">{learning.lastDate || 'Never'}</span></div>
        <div className="flex justify-between text-sm"><span>Missed days (last 7)</span><span className={'font-bold ' + (learning.missedDays >= 3 ? 'text-orange-600' : '')}>{learning.missedDays}</span></div>
        <div className="flex justify-between text-sm"><span>Stump questions logged</span><span className="font-bold">{stumpCount}</span></div>
      </div>

      {flags.length > 0 && (
        <div className="bg-red-50 border-l-4 border-red-500 p-3 rounded">
          <p className="text-sm font-semibold text-red-800">Coaching Flags</p>
          {flags.map((f,i) => <p key={i} className="text-xs text-red-700">- {f}</p>)}
        </div>
      )}

      <div className="bg-white p-4 rounded-lg card-shadow">
        <h3 className="font-semibold text-sm mb-2">Recent Visits</h3>
        {data.visits.slice(0, 10).map(v => {
          const interestLabel = INTEREST_OPTIONS.find(o => o.value === v.interest)?.label || `${v.interest}/5`;
          return (
            <div key={v.id} className="border-b py-1 last:border-0 text-xs">
              <div className="flex justify-between">
                <span onClick={() => goto('doctorDetail', { doctorId: v.doctors?.id })} className="text-purple-700 underline cursor-pointer">{v.doctors?.name}</span>
                <span>{new Date(v.visited_at).toLocaleDateString()}</span>
              </div>
              <div className="text-gray-500">
                {v.met_status === 'doctor' ? 'Met' : v.met_status === 'staff' ? 'Staff' : 'Not met'} - {interestLabel}
                {v.topics_asked?.length > 0 && ' - ' + v.topics_asked.length + ' topics'}
                {v.same_location_flag && <span className="text-orange-600 ml-1">(same-loc)</span>}
              </div>
            </div>
          );
        })}
      </div>
    </div>
  );
}

function AddReferral({ goto, goBack }) {
  const [doctors, setDoctors] = useState([]);
  const [reps, setReps] = useState([]);
  const [zones, setZones] = useState([]);
  const [form, setForm] = useState({ patient_name:'', referred_by_doctor:'', influenced_by_rep:'', zone_id:'', notes:'' });
  const [saving, setSaving] = useState(false);

  useEffect(() => {
    db.getDoctors(null, true).then(setDoctors);
    db.getReps().then(r => setReps(r.filter(x => x.role === 'rep')));
    db.getZones().then(setZones);
  }, []);

  const submit = async () => {
    if (!form.patient_name) { alert('Patient name required'); return; }
    setSaving(true);
    const payload = {
      ...form,
      zone_id: form.zone_id ? parseInt(form.zone_id) : null,
      referred_by_doctor: form.referred_by_doctor || null,
      influenced_by_rep: form.influenced_by_rep || null
    };
    const { error } = await db.addReferral(payload);
    setSaving(false);
    if (error) { alert('Error: ' + error.message); return; }
    alert('Referral logged');
    goBack();
  };

  return (
    <div className="space-y-3">
      <BackButton goBack={goBack} />
      <h2 className="font-bold text-lg cion-primary-text">Log Referral</h2>
      <Field label="Patient Name *"><input className="input" value={form.patient_name} onChange={e => setForm({...form, patient_name: e.target.value})} /></Field>
      <Field label="Referred by Doctor">
        <select className="input" value={form.referred_by_doctor} onChange={e => setForm({...form, referred_by_doctor: e.target.value})}>
          <option value="">None</option>
          {doctors.map(d => <option key={d.id} value={d.id}>{d.name}</option>)}
        </select>
      </Field>
      <Field label="Influenced by Rep">
        <select className="input" value={form.influenced_by_rep} onChange={e => setForm({...form, influenced_by_rep: e.target.value})}>
          <option value="">None</option>
          {reps.map(r => <option key={r.id} value={r.id}>{r.name}</option>)}
        </select>
      </Field>
      <Field label="Zone">
        <select className="input" value={form.zone_id} onChange={e => setForm({...form, zone_id: e.target.value})}>
          <option value="">None</option>
          {zones.map(z => <option key={z.id} value={z.id}>{z.name}</option>)}
        </select>
      </Field>
      <Field label="Notes"><textarea className="input" rows="2" value={form.notes} onChange={e => setForm({...form, notes: e.target.value})} /></Field>
      <button onClick={submit} disabled={saving} className="w-full cion-accent text-white py-3 rounded-lg font-bold disabled:opacity-50">
        {saving ? 'Saving...' : 'Save Referral'}
      </button>
    </div>
  );
}

function CompetitorMap({ goto, goBack }) {
  const [data, setData] = useState([]);
  const [loading, setLoading] = useState(true);

  useEffect(() => { db.getCompetitorMap().then(d => { setData(d); setLoading(false); }); }, []);

  const aggregated = {};
  data.forEach(d => {
    const key = (d.refers_to || '').trim().toLowerCase();
    if (!key) return;
    if (!aggregated[key]) aggregated[key] = { name: d.refers_to, count: 0, specialties: new Set(), zones: new Set() };
    aggregated[key].count++;
    if (d.specialty) aggregated[key].specialties.add(d.specialty);
    if (d.zones?.name) aggregated[key].zones.add(d.zones.name);
  });
  const sorted = Object.values(aggregated).sort((a,b) => b.count - a.count);

  return (
    <div className="space-y-3">
      <BackButton goBack={goBack} />
      <h2 className="font-bold text-lg cion-primary-text">Competitor Map</h2>
      <p className="text-xs text-gray-500">Where doctors currently refer cancer cases</p>
      {loading ? <p>Loading...</p> :
       sorted.length === 0 ? <p className="text-gray-500">No competitor data yet.</p> :
       sorted.map((c, i) => (
        <div key={i} className="bg-white p-3 rounded card-shadow">
          <div className="flex justify-between">
            <p className="font-semibold">{c.name}</p>
            <span className="text-xs bg-red-100 text-red-700 px-2 py-1 rounded">{c.count} doctor{c.count>1?'s':''}</span>
          </div>
          <p className="text-xs text-gray-500">Specialties: {[...c.specialties].join(', ') || '-'}</p>
          <p className="text-xs text-gray-500">Zones: {[...c.zones].join(', ') || '-'}</p>
        </div>
       ))
      }
    </div>
  );
}

            <div className="bg-green-50 p-2 mt-2 rounded">
              <p className="text-xs text-gray-500">Answered {new Date(s.stump_answered_at).toLocaleDateString()}</p>
              <p className="text-sm text-green-800 mt-1">{s.stump_answer}</p>
              <button onClick={() => { setEditing(s); setAnswer(s.stump_answer); }} className="text-xs text-purple-700 underline mt-1">Edit answer</button>
            </div>
          ) : (
            <button onClick={() => { setEditing(s); setAnswer(''); }} className="mt-2 cion-primary text-white px-3 py-1 rounded text-xs">Answer this</button>
          )}
        </div>
       ))
      }

      {editing && (
        <div className="fixed inset-0 bg-black bg-opacity-50 flex items-end z-50">
          <div className="bg-white w-full p-4 rounded-t-xl space-y-3 max-h-[80vh] overflow-auto">
            <h3 className="font-bold cion-primary-text">Answer Stump</h3>
            <p className="text-xs text-gray-500">Visible to all reps in Team FAQ</p>
            <p className="text-sm bg-orange-50 p-2 rounded">Q: {editing.stump_question}</p>
            <textarea className="input" rows="4" value={answer} onChange={e => setAnswer(e.target.value)} placeholder="Your answer..." />
            <div className="flex gap-2">
              <button onClick={submitAnswer} className="flex-1 cion-primary text-white py-2 rounded font-bold">Save</button>
              <button onClick={() => { setEditing(null); setAnswer(''); }} className="flex-1 bg-gray-300 py-2 rounded">Cancel</button>
            </div>
          </div>
        </div>
      )}
    </div>
  );
}

function Field({ label, children }) {
  return (
    <label className="block">
      <span className="text-xs font-semibold text-gray-600 mb-1 block">{label}</span>
      {children}
    </label>
  );
}

function StatBox({ label, val }) {
  return (
    <div className="bg-white p-3 rounded-lg card-shadow text-center">
      <p className="text-xs text-gray-500">{label}</p>
      <p className="text-2xl font-bold cion-primary-text">{val}</p>
    </div>
  );
}

function BottomNav({ screen, goto, isAdmin }) {
  const items = [['home', 'home', 'Home'], ['doctors', 'doctor', 'Doctors'], ['learn', 'book', 'Learn']];
  if (isAdmin) items.push(['dashboard', 'chart', 'Dash']);
  return (
    <nav className="fixed bottom-0 left-0 right-0 bg-white border-t flex justify-around py-2 card-shadow">
      {items.map(([key, iconName, label]) => (
        <button key={key} onClick={() => goto(key)}
          className={'flex flex-col items-center p-1 ' + (screen === key ? 'cion-primary-text' : 'text-gray-500')}>
          <Icon name={iconName} size={22} />
          <span className="text-xs mt-1">{label}</span>
        </button>
      ))}
    </nav>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>

<script>
if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('sw.js').then(reg => {
      let refreshing = false;
      navigator.serviceWorker.addEventListener('controllerchange', () => {
        if (refreshing) return;
        refreshing = true;
        window.location.reload();
      });
    }).catch(() => {});
  });
}
</script>
</body>
</html>
